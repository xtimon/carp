# Supports env vars: ${VAR} or ${VAR:-default}
cluster_name: ${CLUSTER_NAME:-carp}
node_id: ${NODE_ID:-node1}
host: ${HOST:-127.0.0.1}
rack: ${RACK:-rack1}
port: ${PORT:-6379}
gossip_port: ${GOSSIP_PORT:-7000}
rpc_port: ${RPC_PORT:-7379}
replication_factor: ${REPLICATION_FACTOR:-3}
vnodes: ${VNODES:-64}
seed_nodes:
  - host: ${SEED_HOST:-127.0.0.1}
    gossip_port: 7000   # node1
  - host: ${SEED_HOST:-127.0.0.1}
    gossip_port: 7001   # node2
  - host: ${SEED_HOST:-127.0.0.1}
    gossip_port: 7002   # node3
# Redis-style persistence (optional)
dir: ${DIR:-./data}
dbfilename: ${DBFILENAME:-dump-node1.rdb}
save_interval: ${SAVE_INTERVAL:-60}  # 0 = disabled
